# Blueprint Render : https://render.com/docs/blueprint-specification
# Créer un compte Render → New → Blueprint → connecter ce dépôt GitHub.
# Renseigner les variables marquées sync: false lors de l’import ou dans Environment.

services:
  - type: web
    name: golivra-api
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Sans Twilio payé : le code OTP est renvoyé dans la réponse API (mode test).
      # Quand Twilio est prêt : mettre OTP_TEST_MODE=0 et renseigner TWILIO_* ci-dessous.
      - key: OTP_TEST_MODE
        value: "1"
      - key: SUPABASE_STORAGE_BUCKET
        value: public
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Twilio — optionnel tant que OTP_TEST_MODE=1 (inscription via code affiché dans l’app)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # ── PawaPay (Mobile Money Congo) ─────────────────────────────────────
      # Clé API Bearer fournie par PawaPay (header X-Api-Key / Authorization).
      # Si vide, le module payments/ bascule en mode simulation (sandbox interne).
      - key: PAWAPAY_API_KEY
        sync: false
      - key: PAWAPAY_API_BASE
        value: https://api.sandbox.pawapay.io
      # Secret HMAC-SHA256 pour la vérification des webhooks. Configurer la
      # même valeur côté dashboard PawaPay sur les URLs
      # https://<ton-domaine>/webhooks/pawapay/{deposits,payments,refunds}
      - key: PAWAPAY_WEBHOOK_SECRET
        sync: false
      # Mode de paiement : "test" (simulation, sans PawaPay) ou "live".
      - key: PAYMENT_MODE
        value: live
      # Wallet plateforme GoLivra (utilisateur admin utilisé pour les commissions).
      - key: GOLIVRA_PLATFORM_USER_ID
        sync: false
      - key: GOLIVRA_PLATFORM_EMAIL
        value: golivra@gmail.com
      # Jobs paiements (laisser actifs en production).
      - key: PAYMENTS_SCHEDULER
        value: "1"
      - key: PAYOUT_AUTO_ENABLED
        value: "1"
      - key: ESCROW_AUTO_RELEASE
        value: "1"
